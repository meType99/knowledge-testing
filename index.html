<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Тест по программированию</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f0f2f5;
  text-align: center;
  margin: 0;
}

h1 {
  background: #ffffff;
  padding: 20px;
  margin: 0;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.container {
  background: #ffffff;
  max-width: 500px;
  margin: 40px auto;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

button {
  display: block;
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border: none;
  border-radius: 8px;
  background: #e0e0e0;
  font-size: 16px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #d5d5d5;
}

button.correct {
  background: #4CAF50 !important;
  color: white;
}

button.wrong {
  background: #f44336 !important;
  color: white;
}

.hidden {
  display: none;
}

#timer {
  color: #555;
  margin-bottom: 10px;
}
</style>

</head>

<body>

<h1>Тест по программированию</h1>

<div class="container" id="start">
<h2>Выберите уровень</h2>
<button onclick="startTest('easy')">Легкий</button>
<button onclick="startTest('medium')">Средний</button>
<button onclick="startTest('hard')">Сложный</button>
</div>

<div class="container hidden" id="quiz">
<div id="timer">Время: 0</div>
<h2 id="question"></h2>
<div id="answers"></div>
<button onclick="nextQuestion()">Далее</button>
</div>

<div class="container hidden" id="result">
<h2>Результаты</h2>
<p id="score"></p>
<p id="avgTime"></p>
<p id="errors"></p>
<canvas id="chart" width="200" height="200"></canvas>
</div>

<script>
// ===== ВОПРОСЫ =====
const questions = {
easy: [
{q:"HTML это?", a:["Язык разметки","Язык программирования","БД"], correct:0},
{q:"CSS отвечает за?", a:["Стиль","Логику","Сервер"], correct:0},
{q:"Python файл?", a:[".py",".js",".html"], correct:0},
{q:"JS выполняется?", a:["В браузере","В BIOS","В принтере"], correct:0},
{q:"C++ это?", a:["Язык программирования","ОС","Редактор"], correct:0},
{q:"<p> это?", a:["Тег","Функция","Переменная"], correct:0},
{q:"CSS цвет?", a:["color","font","bg"], correct:0},
{q:"Python print?", a:["Вывод","Ввод","Цикл"], correct:0},
{q:"JS переменная?", a:["let","echo","varr"], correct:0},
{q:"HTML заголовок?", a:["<h1>","<p>","<div>"], correct:0}
],

medium: [
{q:"C++ поддерживает ООП?", a:["Да","Нет","Только частично"], correct:0},
{q:"Python отступы?", a:["Обязательны","Нет","Случайны"], correct:0},
{q:"JS массив?", a:["[]","()","{}"], correct:0},
{q:"CSS flex используется для?", a:["Гибкой верстки","БД","API"], correct:0},
{q:"HTML форма?", a:["<form>","<div>","<span>"], correct:0},
{q:"JS функция объявляется через?", a:["function","def","fun"], correct:0},
{q:"Python цикл?", a:["for","repeat","loop"], correct:0},
{q:"C++ ввод данных?", a:["cin","print","scan"], correct:0},
{q:"CSS класс обозначается?", a:[".","#","@"], correct:0},
{q:"JS объект?", a:["{}","[]","()"], correct:0}
],

hard: [
{q:"Что такое замыкание в JS?", a:["Функция + область видимости","Цикл","Класс"], correct:0},
{q:"Big O обозначает?", a:["Сложность алгоритма","Тип данных","Переменную"], correct:0},
{q:"Python lambda это?", a:["Анонимная функция","Цикл","Класс"], correct:0},
{q:"C++ указатель хранит?", a:["Адрес","Тип","Цикл"], correct:0},
{q:"CSS z-index отвечает за?", a:["Слой","Цвет","Размер"], correct:0},
{q:"JS Promise это?", a:["Асинхронность","Цикл","Тип"], correct:0},
{q:"HTML семантика нужна для?", a:["Структуры","Стиля","API"], correct:0},
{q:"Python list это?", a:["Список","Массив","Кортеж"], correct:0},
{q:"C++ vector это?", a:["Контейнер","Файл","Функция"], correct:0},
{q:"JS async/await используется для?", a:["Асинхронного кода","Синхронного","Ошибок"], correct:0}
]
};

// ===== ПЕРЕМЕННЫЕ =====
let current = 0;
let score = 0;
let mistakes = 0;
let times = [];
let startTime;
let timerInterval;
let totalTime = 0;
let levelData = [];

function shuffleAnswers(question){
    let answers = question.a.map((text, index) => ({
        text,
        correct: index === question.correct
    }));
    for (let i = answers.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [answers[i], answers[j]] = [answers[j], answers[i]];
    }
    return answers;
}

// ===== СТАРТ =====
function startTest(level){
    document.getElementById('start').classList.add('hidden');
    document.getElementById('quiz').classList.remove('hidden');

    // Копируем и перемешиваем вопросы
    levelData = shuffleArray([...questions[level]]);
    
    current = 0;
    score = 0;
    mistakes = 0;
    times = [];
    totalTime = 0;

    startTimer();
    showQuestion();
}

// Функция перемешивания массива (Fisher-Yates)
function shuffleArray(arr){
    for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

// ===== ТАЙМЕР =====
function startTimer(){
timerInterval = setInterval(()=>{
totalTime++;
document.getElementById('timer').innerText = "Время: " + totalTime;
},1000);
}

// ===== ВОПРОС =====
function showQuestion(){
    let q = levelData[current];
    document.getElementById('question').innerText = q.q;

    // Перемешиваем ответы
    let shuffledAnswers = shuffleAnswers(q);

    let html = "";
    shuffledAnswers.forEach(ans=>{
        html += `<button onclick="checkAnswer(${ans.correct}, this)">${ans.text}</button>`;
    });

    document.getElementById('answers').innerHTML = html;
    startTime = Date.now();
}

// ===== ПРОВЕРКА =====
function checkAnswer(isCorrect, btn){
    let timeSpent = (Date.now() - startTime)/1000;
    times.push(timeSpent);

    let buttons = document.querySelectorAll('#answers button');
    buttons.forEach(b => b.disabled = true);

    if(isCorrect){
        score++;
        btn.classList.add("correct");
    } else {
        mistakes++;
        btn.classList.add("wrong");

        // подсветка правильного ответа
        buttons.forEach(b=>{
            if(b.onclick.toString().includes("true")){
                b.classList.add("correct");
            }
        });
    }
}


// ===== ДАЛЕЕ =====
function nextQuestion(){
current++;
if(current < levelData.length){
showQuestion();
}else{
finishTest();
}
}

// ===== СТАТИСТИКА =====
function calculateStats(){
let avg = times.reduce((a,b)=>a+b,0)/times.length;
let errorPercent = (mistakes/levelData.length)*100;
let correctPercent = 100 - errorPercent;

return {
avg: avg.toFixed(2),
errorPercent: errorPercent.toFixed(2),
correctPercent
};
}

// ===== ФИНИШ =====
function finishTest(){
clearInterval(timerInterval);

document.getElementById('quiz').classList.add('hidden');
document.getElementById('result').classList.remove('hidden');

let stats = calculateStats();

document.getElementById('score').innerText =
`Правильных: ${score}/${levelData.length}`;

document.getElementById('avgTime').innerText =
`Среднее время: ${stats.avg} сек`;

document.getElementById('errors').innerText =
`Ошибки: ${stats.errorPercent}%`;

drawChart(score, mistakes);
}

// ===== ГРАФИК =====
function drawChart(correct, errors){
    let canvas = document.getElementById('chart');
    let ctx = canvas.getContext('2d');

    let total = correct + errors;
    let correctAngle = (correct / total) * 2 * Math.PI;

    // очистка
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    let startAngle = 0;

    // 🟢 правильные
    ctx.beginPath();
    ctx.moveTo(100,100);
    ctx.arc(100,100,100, startAngle, startAngle + correctAngle);
    ctx.closePath();
    ctx.fillStyle = "#4CAF50";
    ctx.fill();

    // 🔴 ошибки
    startAngle += correctAngle;

    ctx.beginPath();
    ctx.moveTo(100,100);
    ctx.arc(100,100,100, startAngle, 2 * Math.PI);
    ctx.closePath();
    ctx.fillStyle = "#f44336";
    ctx.fill();
}
</script>

</body>
</html>
